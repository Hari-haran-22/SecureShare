<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureShare .NET</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            color: #bb86fc;
            margin-bottom: 5px;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="file"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #333;
            background-color: #2d2d2d;
            color: white;
            box-sizing: border-box;
        }

        button {
            background-color: #bb86fc;
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

            button:hover {
                background-color: #9965f4;
            }

        #resultArea {
            margin-top: 30px;
            display: none;
            padding: 15px;
            background-color: #2d2d2d;
            border-radius: 5px;
            border-left: 4px solid #03dac6;
        }

        a.download-link {
            color: #03dac6;
            word-break: break-all;
            font-weight: bold;
            text-decoration: none;
        }

            a.download-link:hover {
                text-decoration: underline;
            }

        .loader {
            display: none;
            margin-top: 20px;
            color: #bb86fc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SecureShare.API</h1>
        <p>Encrypted, Self-Destructing File Sharing</p>

        <div class="form-group">
            <label for="fileInput">Select File to Encrypt:</label>
            <input type="file" id="fileInput" required>
        </div>

        <div class="form-group">
            <label for="expiryHours">Expire after (Hours):</label>
            <input type="number" id="expiryHours" value="24" min="1">
        </div>

        <div class="form-group">
            <label for="maxDownloads">Max Downloads:</label>
            <input type="number" id="maxDownloads" value="1" min="1">
        </div>

        <button id="uploadBtn" onclick="uploadFile()">Encrypt & Generate Link</button>
        <div id="loading" class="loader">Encrypting file... Please wait.</div>

        <div id="resultArea">
            <p style="color: white; margin-bottom: 10px;">Success! Share this secure link:</p>
            <a id="downloadUrl" class="download-link" href="#" target="_blank"></a>
            <p style="font-size: 12px; margin-top: 15px;">Link will self-destruct after it is downloaded.</p>
        </div>
    </div>

    <script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const expiryHours = document.getElementById('expiryHours').value;
        const maxDownloads = document.getElementById('maxDownloads').value;
        const uploadBtn = document.getElementById('uploadBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');

        if (!fileInput.files[0]) {
            alert("Please select a file first.");
            return;
        }

        // Prepare the UI
        uploadBtn.style.display = 'none';
        loading.style.display = 'block';
        resultArea.style.display = 'none';

        // Build the form data to send to the API
        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("expiryHours", expiryHours);
        formData.append("maxDownloads", maxDownloads);

        try {
            // Call your .NET API
            const response = await fetch('/api/files/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const data = await response.json();

                // Display the secure link
                const linkElement = document.getElementById('downloadUrl');
                linkElement.href = data.url;
                linkElement.innerText = data.url;
                resultArea.style.display = 'block';
            } else {
                alert("Error uploading file. Check console for details.");
            }
        } catch (error) {
            console.error("Upload failed:", error);
            alert("Network error. Is the server running?");
        } finally {
            // Reset the UI
            loading.style.display = 'none';
            uploadBtn.style.display = 'block';
            fileInput.value = ''; // clear the file input
        }
    }
    </script>

</body>
</html>
